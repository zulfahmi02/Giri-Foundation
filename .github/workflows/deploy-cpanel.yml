name: Deploy to cPanel

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Trust cPanel host
        run: ssh-keyscan -p "${{ secrets.CPANEL_PORT }}" "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            --exclude='vendor/' \
            -e "ssh -p ${CPANEL_PORT}" \
            ./ "${CPANEL_USER}@${CPANEL_HOST}:${CPANEL_REPO_PATH}/"

      - name: Run deployment on server
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}
        run: |
          ssh -p "${CPANEL_PORT}" "${CPANEL_USER}@${CPANEL_HOST}" "
            export CPANEL_COMPOSER_BIN=\$HOME/bin/composer
            export CPANEL_WEB_ROOT=\$HOME/public_html
            export CPANEL_RUN_MIGRATIONS=1
            export CPANEL_BUILD_FRONTEND=0
            cd '${CPANEL_REPO_PATH}'
            /bin/bash ./cpanel-deploy.sh
          "
