name: Deploy to cPanel

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Trust cPanel host
        run: ssh-keyscan -p "${{ secrets.CPANEL_PORT }}" "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts

      - name: Push branch to cPanel managed repository
        env:
          CPANEL_REMOTE: ssh://${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:${{ secrets.CPANEL_PORT }}${{ secrets.CPANEL_REPO_PATH }}
        run: git push "$CPANEL_REMOTE" HEAD:main
